// Texas bounding box
const TX_BOUNDS = { minLat: 25.8, maxLat: 36.5, minLng: -106.7, maxLng: -93.5 };
function projectToXY(lat, lng, w, h) {
  const x = (lng - TX_BOUNDS.minLng) / (TX_BOUNDS.maxLng - TX_BOUNDS.minLng) * w;
  const y = h - (lat - TX_BOUNDS.minLat) / (TX_BOUNDS.maxLat - TX_BOUNDS.minLat) * h;
  return { x, y };
}

// ─── FILTER CHIPS ─────────────────────────────────────────────────────────
function FilterChips({ activeFilters, toggleFilter, clearAll }) {
  const [openMenu, setOpenMenu] = useState(null);
  const totalActive = Object.values(activeFilters).reduce((a, b) => a + b.length, 0);
  return (
    <div style={{ padding: '0 48px', maxWidth: 1240, margin: '0 auto 20px', display: 'flex', gap: 10, flexWrap: 'wrap', alignItems: 'center' }}>
      {Object.keys(FILTERS).map((cat) => {
        const count = activeFilters[cat]?.length || 0;
        const isOpen = openMenu === cat;
        return (
          <div key={cat} style={{ position: 'relative' }}>
            <button
              onClick={() => setOpenMenu(isOpen ? null : cat)}
              style={{
                padding: '8px 18px', borderRadius: 24,
                border: '1px solid ' + (count > 0 ? 'var(--accent)' : 'var(--border)'),
                background: count > 0 ? 'var(--accent)' : 'var(--card)',
                color: count > 0 ? 'white' : 'var(--ink)',
                fontSize: 13, cursor: 'pointer', display: 'flex', alignItems: 'center', gap: 8,
                transition: 'all 0.2s'
              }}>
              {cat}{count > 0 && <span style={{ background: 'rgba(255,255,255,0.25)', borderRadius: 10, padding: '1px 7px', fontSize: 11, fontFamily: 'var(--mono)' }}>{count}</span>}
              <span style={{ fontSize: 10, opacity: 0.7 }}>▾</span>
            </button>
            {isOpen &&
            <div style={{ position: 'absolute', top: 'calc(100% + 8px)', left: 0, background: 'var(--card)', border: '1px solid var(--border)', borderRadius: 12, padding: 12, zIndex: 20, minWidth: 200, boxShadow: '0 8px 24px rgba(27,36,82,0.08)', maxHeight: 320, overflowY: 'auto' }}>
                {FILTERS[cat].map((v) => {
                const checked = activeFilters[cat]?.includes(v);
                return (
                  <label key={v} style={{ display: 'flex', alignItems: 'center', gap: 10, padding: '6px 8px', cursor: 'pointer', borderRadius: 6, fontSize: 13, color: 'var(--ink)' }}
                  onMouseEnter={(e) => e.currentTarget.style.background = 'var(--bg2)'}
                  onMouseLeave={(e) => e.currentTarget.style.background = 'transparent'}>
                      <input type="checkbox" checked={!!checked} onChange={() => toggleFilter(cat, v)}
                    style={{ accentColor: 'var(--accent)', width: 14, height: 14 }} />
                      {v}
                    </label>);

              })}
              </div>
            }
          </div>);

      })}

    </div>);

}

function MapPanel({ projects, selected, setSelected }) {
  const [zoom, setZoom] = useState(1);
  const [pan, setPan] = useState({ x: 0, y: 0 });
  const [drag, setDrag] = useState(null);
  const zoomIn = () => setZoom((z) => Math.min(4, +(z * 1.4).toFixed(2)));
  const zoomOut = () => setZoom((z) => {
    const nz = Math.max(1, +(z / 1.4).toFixed(2));
    if (nz === 1) setPan({ x: 0, y: 0 });
    return nz;
  });
  const resetZoom = () => {setZoom(1);setPan({ x: 0, y: 0 });};
  const onMouseDown = (e) => {if (zoom > 1) setDrag({ x: e.clientX, y: e.clientY, px: pan.x, py: pan.y });};
  const onMouseMove = (e) => {
    if (!drag) return;
    setPan({ x: drag.px + (e.clientX - drag.x), y: drag.py + (e.clientY - drag.y) });
  };
  const onMouseUp = () => setDrag(null);
  const W = 700,H = 620;
  const pinned = projects.map((p) => ({ ...p, ...projectToXY(p.lat, p.lng, W, H) }));

  return (
    <div style={{ background: 'var(--card)', border: '1px solid var(--border)', borderRadius: 16, overflow: 'hidden', position: 'relative', display: 'flex', flexDirection: 'column' }}>
      <div style={{ padding: '20px 24px 12px', display: 'flex', alignItems: 'center', justifyContent: 'space-between', borderBottom: '1px solid var(--border)' }}>
        <div>
          <div style={{ fontFamily: 'var(--mono)', fontSize: 10, letterSpacing: '0.15em', color: 'var(--ink3)', textTransform: 'uppercase', marginBottom: 4 }}>Map</div>
          <div style={{ fontSize: 15, fontWeight: 600, color: 'var(--ink)' }}>Project Locations · Texas</div>
        </div>
        <div style={{ display: 'flex', gap: 6 }}>
          <button onClick={zoomIn} title="Zoom in" style={{ width: 28, height: 28, borderRadius: 4, border: '1px solid var(--border)', background: 'var(--card)', cursor: 'pointer', color: 'var(--ink2)', fontSize: 16, lineHeight: 1 }}>+</button>
          <button onClick={zoomOut} title="Zoom out" style={{ width: 28, height: 28, borderRadius: 4, border: '1px solid var(--border)', background: 'var(--card)', cursor: zoom > 1 ? 'pointer' : 'default', color: zoom > 1 ? 'var(--ink2)' : 'var(--ink3)', fontSize: 16, lineHeight: 1, opacity: zoom > 1 ? 1 : 0.5 }}>−</button>
          {zoom > 1 && <button onClick={resetZoom} title="Reset zoom" style={{ width: 28, height: 28, borderRadius: 4, border: '1px solid var(--border)', background: 'var(--card)', cursor: 'pointer', color: 'var(--ink2)', fontSize: 11, fontFamily: 'var(--mono)' }}>⟲</button>}
        </div>
      </div>
      <div style={{ position: 'relative', flex: 1, minHeight: 400 }}>
        <svg viewBox={`0 0 ${W} ${H}`}
        onMouseDown={onMouseDown} onMouseMove={onMouseMove} onMouseUp={onMouseUp} onMouseLeave={onMouseUp}
        style={{ width: '100%', height: 'auto', display: 'block', background: 'var(--bg2)', cursor: zoom > 1 ? drag ? 'grabbing' : 'grab' : 'default', userSelect: 'none' }}>
          {/* Watercolor texture behind */}
          <defs>
            <pattern id="tx-wash" x="0" y="0" width="40" height="40" patternUnits="userSpaceOnUse">
              <rect width="40" height="40" fill="var(--accent)" opacity="0.04" />
              <circle cx="10" cy="10" r="1.5" fill="var(--accent)" opacity="0.06" />
              <circle cx="30" cy="25" r="1" fill="var(--accent)" opacity="0.05" />
            </pattern>
            <filter id="wash-blur"><feGaussianBlur stdDeviation="0.5" /></filter>
          </defs>
          {/* Texas silhouette */}
          <g style={{ transform: `translate(${pan.x / zoom}px, ${pan.y / zoom}px) scale(${zoom})`, transformOrigin: '50% 50%', transition: drag ? 'none' : 'transform 0.18s ease-out' }}>
            <path d={TEXAS_PATH} fill="var(--accent)" fillOpacity="0.08" stroke="var(--accent)" strokeWidth="1.5" strokeOpacity="0.5" strokeLinejoin="round" />
            <path d={TEXAS_PATH} fill="url(#tx-wash)" />
          {/* City labels (major refs) */}
          {[
            { n: 'DFW', lat: 32.78, lng: -96.8, off: [0, -8] },
            { n: 'HOUSTON', lat: 29.76, lng: -95.37, off: [0, -8] },
            { n: 'AUSTIN', lat: 30.26, lng: -97.75, off: [-12, -8] },
            { n: 'SAN ANTONIO', lat: 29.43, lng: -98.49, off: [-5, 10] },
            { n: 'EL PASO', lat: 31.76, lng: -106.48, off: [20, -4] }].
            map((l) => {
              const { x, y } = projectToXY(l.lat, l.lng, W, H);
              return <text key={l.n} x={x + l.off[0]} y={y + l.off[1]} fontFamily="Space Mono" fontSize="9" fill="var(--ink3)" letterSpacing="1" textAnchor={l.off[0] < 0 ? 'end' : 'start'}>{l.n}</text>;
            })}
          {/* Pins */}
          {pinned.map((p) => {
              const isSel = selected === p.id;
              return (
                <g key={p.id} style={{ cursor: 'pointer' }} onClick={() => setSelected(p.id)}
                onMouseEnter={() => setSelected(p.id)}>
                {/* Pulse ring for selected */}
                {isSel && <circle cx={p.x} cy={p.y} r="16" fill={p.accent} opacity="0.15" />}
                {isSel && <circle cx={p.x} cy={p.y} r="10" fill={p.accent} opacity="0.25" />}
                {/* Pin */}
                <path d={`M ${p.x} ${p.y - 14} C ${p.x - 6} ${p.y - 14} ${p.x - 6} ${p.y - 6} ${p.x} ${p.y} C ${p.x + 6} ${p.y - 6} ${p.x + 6} ${p.y - 14} ${p.x} ${p.y - 14} Z`}
                  fill={isSel ? p.accent : 'white'} stroke={p.accent} strokeWidth="2" />
                <circle cx={p.x} cy={p.y - 10} r="2.5" fill={isSel ? 'white' : p.accent} />
              </g>);

            })}
          </g>
        </svg>
        {zoom > 1 &&
        <div style={{ position: 'absolute', top: 12, right: 12, background: 'rgba(255,255,255,0.92)', padding: '4px 10px', borderRadius: 12, fontSize: 11, fontFamily: 'var(--mono)', color: 'var(--ink2)', border: '1px solid var(--border)' }}>
            {zoom.toFixed(1)}×

// ─── COMPARE SECTION ──────────────────────────────────────────────────────
function CompareSection() {
  const [selected, setSelected] = useState(['assembly-park', 'plano', 'frisco']);
  const toggle = (id) => setSelected((s) => s.includes(id) ? s.filter((x) => x !== id) : [...s, id]);

  const picked = PROJECTS.filter((p) => selected.includes(p.id));
  const maxInvest = Math.max(...PROJECTS.map((p) => p.investmentNum));
  const maxUnits  = Math.max(...PROJECTS.map((p) => p.affordableUnits));
  const maxAff    = Math.max(...PROJECTS.map((p) => p.affordableNum));
  const maxSust   = 100;

  // Summary deltas
  const totalInvest = picked.reduce((s,p) => s + p.investmentNum, 0);
  const avgAff = picked.length ? (picked.reduce((s,p) => s + p.affordableNum, 0) / picked.length).toFixed(1) : 0;
  const totalAffUnits = picked.reduce((s,p) => s + p.affordableUnits, 0);
  const avgSust = picked.length ? Math.round(picked.reduce((s,p) => s + p.sustainScore, 0) / picked.length) : 0;

  // Carousel state — how many cards visible per page based on viewport
  const [perPage, setPerPage] = useState(2);
  const [page, setPage] = useState(0);
  const trackRef = useRef(null);

  useEffect(() => {
    const update = () => {
      const w = window.innerWidth;
      if (w < 760) setPerPage(1);
      else if (w < 1100) setPerPage(2);
      else setPerPage(2);
    };
    update();
    window.addEventListener('resize', update);
    return () => window.removeEventListener('resize', update);
  }, []);

  const totalPages = Math.max(1, Math.ceil(picked.length / perPage));
  // Clamp page when selection/perPage changes
  useEffect(() => {
    if (page > totalPages - 1) setPage(Math.max(0, totalPages - 1));
  }, [totalPages, page]);

  const prev = () => setPage((p) => (p - 1 + totalPages) % totalPages);
  const next = () => setPage((p) => (p + 1) % totalPages);

  return (
    <section id="compare" style={{ padding: '80px 48px 60px', maxWidth: 1240, margin: '0 auto' }}>
      <div style={{ display: 'flex', alignItems: 'flex-end', justifyContent: 'space-between', marginBottom: 28, flexWrap: 'wrap', gap: 16 }}>
        <div>
          <div style={{ fontFamily: 'var(--mono)', fontSize: 11, letterSpacing: '0.16em', color: 'var(--ink3)', textTransform: 'uppercase', marginBottom: 8 }}>Dashboard · Side-by-side</div>
          <h2 style={{ fontFamily: 'var(--serif)', fontSize: 'clamp(36px,4.4vw,56px)', fontWeight: 500, color: 'var(--ink)', letterSpacing: '-0.02em', lineHeight: 1.05 }}>Project Comparison</h2>
          <p style={{ fontSize: 14, color: 'var(--ink2)', marginTop: 10, maxWidth: 560, lineHeight: 1.6 }}>
            Pick two or more projects and scroll the carousel — capital stack, affordability verdict, sustainability index, and the mix of uses that shapes each district.
          </p>
        </div>
        {picked.length >= 2 &&
          <div style={{ display: 'flex', gap: 18, flexWrap: 'wrap' }}>
            {[
              { label: 'Combined', value: '$' + totalInvest.toFixed(2) + 'B', sub: 'invested' },
              { label: 'Avg Affordable', value: avgAff + '%', sub: 'of all units' },
              { label: 'Affordable Units', value: totalAffUnits.toLocaleString(), sub: 'combined' },
              { label: 'Avg Sustain', value: avgSust + '/100', sub: 'index score' }
            ].map((s) => (
              <div key={s.label} style={{ minWidth: 120, padding: '12px 16px', background: 'var(--card)', border: '1px solid var(--border)', borderRadius: 12 }}>
                <div style={{ fontFamily: 'var(--mono)', fontSize: 9, letterSpacing: '0.12em', color: 'var(--ink3)', textTransform: 'uppercase' }}>{s.label}</div>
                <div style={{ fontFamily: 'var(--serif)', fontSize: 22, fontWeight: 500, color: 'var(--ink)', marginTop: 2 }}>{s.value}</div>
                <div style={{ fontSize: 10, color: 'var(--ink3)', fontFamily: 'var(--mono)' }}>{s.sub}</div>
              </div>
            ))}
          </div>
        }
      </div>

      <CompareSelector allProjects={PROJECTS} selected={selected} toggle={toggle} />

      <div style={{ marginTop: 24 }}>
        {picked.length < 2 ?
          <div style={{ padding: '60px 20px', textAlign: 'center', background: 'var(--card)', borderRadius: 18, border: '1px dashed var(--border)' }}>
            <div style={{ fontFamily: 'var(--serif)', fontSize: 20, color: 'var(--ink)', marginBottom: 6 }}>Select at least 2 projects</div>
            <div style={{ fontSize: 13, color: 'var(--ink2)' }}>Use the chips above to build a comparison.</div>
          </div>
          :
          <div>
            {/* Carousel header — pagination controls */}
            <div style={{ display: 'flex', alignItems: 'center', justifyContent: 'space-between', marginBottom: 16 }}>
              <div style={{ fontFamily: 'var(--mono)', fontSize: 10, letterSpacing: '0.14em', color: 'var(--ink3)', textTransform: 'uppercase' }}>
                Showing {page * perPage + 1}–{Math.min((page + 1) * perPage, picked.length)} of {picked.length}
              </div>
              <div style={{ display: 'flex', alignItems: 'center', gap: 10 }}>
                {/* Dots */}
                <div style={{ display: 'flex', gap: 6, marginRight: 6 }}>
                  {Array.from({ length: totalPages }).map((_, i) => (
                    <button key={i} onClick={() => setPage(i)} aria-label={`Page ${i+1}`}
                      style={{
                        width: i === page ? 20 : 8, height: 8, borderRadius: 4,
                        border: 'none', padding: 0, cursor: 'pointer',
                        background: i === page ? 'var(--accent)' : 'var(--border)',
                        transition: 'all 0.25s ease'
                      }}/>
                  ))}
                </div>
                <button onClick={prev} aria-label="Previous" disabled={totalPages <= 1}
                  style={{ width: 40, height: 40, borderRadius: '50%', border: '1px solid var(--border)', background: 'var(--card)', cursor: totalPages > 1 ? 'pointer' : 'default', opacity: totalPages > 1 ? 1 : 0.4, display: 'flex', alignItems: 'center', justifyContent: 'center', color: 'var(--ink)' }}>
                  <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M15 18l-6-6 6-6"/></svg>
                </button>
                <button onClick={next} aria-label="Next" disabled={totalPages <= 1}
                  style={{ width: 40, height: 40, borderRadius: '50%', border: '1px solid var(--accent)', background: 'var(--accent)', cursor: totalPages > 1 ? 'pointer' : 'default', opacity: totalPages > 1 ? 1 : 0.4, display: 'flex', alignItems: 'center', justifyContent: 'center', color: 'white' }}>
                  <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M9 18l6-6-6-6"/></svg>
                </button>
              </div>
            </div>

            {/* Carousel viewport */}
            <div style={{ overflow: 'hidden', position: 'relative' }}>
              <div
                ref={trackRef}
                style={{
                  display: 'flex',
                  transform: `translateX(-${page * 100}%)`,
                  transition: 'transform 0.5s cubic-bezier(0.22, 0.61, 0.36, 1)',
                  gap: 0
                }}>
                {Array.from({ length: totalPages }).map((_, pageIdx) => {
                  const slice = picked.slice(pageIdx * perPage, (pageIdx + 1) * perPage);
                  return (
                    <div key={pageIdx} style={{ flex: '0 0 100%', display: 'grid', gridTemplateColumns: `repeat(${perPage}, 1fr)`, gap: 20, paddingRight: 2 }}>
                      {slice.map((p) => (
                        <CompareCard key={p.id} p={p} maxInvest={maxInvest} maxUnits={maxUnits} maxAff={maxAff} maxSust={maxSust} />
                      ))}
                      {/* Pad out the last page so grid cells match perPage */}
                      {slice.length < perPage && Array.from({ length: perPage - slice.length }).map((_, i) => (
                        <div key={'pad-' + i} />
                      ))}
                    </div>
                  );
                })}
              </div>
            </div>
          </div>
        }
      </div>
    </section>
  );
}

// ─── MAIN LAYOUT ──────────────────────────────────────────────────────────
function Main() {
  const [query, setQuery] = useState('');
  const [activeFilters, setActiveFilters] = useState({});
  const [selected, setSelected] = useState('assembly-park');

  const toggleFilter = (cat, val) => {
    setActiveFilters((f) => {
      const cur = f[cat] || [];
      const next = cur.includes(val) ? cur.filter((x) => x !== val) : [...cur, val];
      return { ...f, [cat]: next };
    });
  };
  const clearAll = () => setActiveFilters({});

  const filtered = useMemo(() => {
    return PROJECTS.filter((p) => {
      // Search
      if (query) {
        const q = query.toLowerCase();
        if (!p.name.toLowerCase().includes(q) && !p.city.toLowerCase().includes(q) && !p.type.toLowerCase().includes(q) && !p.tags.some((t) => t.toLowerCase().includes(q))) return false;
      }
      // Filter groups (AND across categories, OR within category)
      for (const [cat, vals] of Object.entries(activeFilters)) {
        if (!vals.length) continue;
        if (cat === 'State' && !vals.includes(p.state)) return false;
        if (cat === 'City' && !vals.includes(p.city)) return false;
        if (cat === 'Region' && !vals.includes(p.region)) return false;
        if (cat === 'Tag' && !vals.some((v) => p.tags.includes(v))) return false;
      }
      return true;
    });
  }, [query, activeFilters]);

  return (
    <>
      <Nav />
      <HeroTitle />
      <SearchBar query={query} setQuery={setQuery} />
      <FilterChips activeFilters={activeFilters} toggleFilter={toggleFilter} clearAll={clearAll} />

      <section id="case-studies" style={{ padding: '20px 48px 60px', maxWidth: 1240, margin: '0 auto' }}>
        <div style={{ display: 'grid', gridTemplateColumns: '1fr 1fr', gap: 24 }}>
          {/* Left: project grid */}
          <div style={{ display: 'grid', gridTemplateColumns: '1fr 1fr', gap: 16, alignContent: 'start' }}>
            {filtered.length === 0 &&
            <div style={{ gridColumn: '1 / -1', padding: '60px 20px', textAlign: 'center', background: 'var(--card)', borderRadius: 14, border: '1px dashed var(--border)' }}>
                <div style={{ fontSize: 36, marginBottom: 12, opacity: 0.3 }}>⌘</div>
                <div style={{ fontSize: 14, color: 'var(--ink2)', marginBottom: 6 }}>No projects match your filters</div>
                <button onClick={clearAll} style={{ marginTop: 10, background: 'var(--accent)', color: 'white', border: 'none', padding: '8px 18px', borderRadius: 20, fontSize: 12, cursor: 'pointer' }}>Clear filters</button>
              </div>
            }
            {filtered.map((p) =>
            <ProjectCard key={p.id} p={p} onHover={setSelected} isHighlighted={selected === p.id} />
            )}
          </div>
          {/* Right: map panel (sticky) */}
          <div id="map" style={{ position: 'sticky', top: 24, alignSelf: 'start' }}>
            <MapPanel projects={filtered} selected={selected} setSelected={setSelected} />
          </div>
        </div>
      </section>

      {/* Divider */}
      <div style={{ maxWidth: 1100, margin: '0 auto', padding: '0 48px' }}>
        <div style={{ height: 1, background: 'var(--accent)', opacity: 0.2 }} />
      </div>

      <CompareSection />

      {/* Divider */}
      <div style={{ maxWidth: 1100, margin: '0 auto', padding: '0 48px' }}>
        <div style={{ height: 1, background: 'var(--accent)', opacity: 0.2 }} />
      </div>

      {/* Request */}
      <section id="about" style={{ padding: '80px 48px 100px', textAlign: 'center', maxWidth: 640, margin: '0 auto' }}>
        <h2 style={{ fontFamily: 'var(--serif)', fontSize: 32, fontWeight: 500, color: 'var(--ink)', marginBottom: 16, letterSpacing: '-0.02em' }}>About

        </h2>
        <p style={{ fontSize: 14, color: 'var(--ink2)', lineHeight: 1.7, marginBottom: 28, maxWidth: 440, margin: '0 auto 28px' }}>
          Our urban design studio is always expanding its case study catalog. Texas mixed-use development is diverse and abundant — request a study and we'll do our best to help.
        </p>
        <a href="mailto:info@assemblyurban.com" style={{ display: 'inline-block', background: 'transparent', border: '1px solid var(--accent)', color: 'var(--accent)', padding: '12px 28px', borderRadius: 24, fontSize: 13, fontWeight: 500, textDecoration: 'none' }}>
          Request a case study
        </a>
      </section>

      {/* Decorative divider */}
      <div style={{ height: 32, background: `repeating-linear-gradient(90deg, var(--accent) 0, var(--accent) 1px, transparent 1px, transparent 12px)`, opacity: 0.3 }} />

      {/* Footer */}
      <footer style={{ padding: '40px 48px 48px', display: 'flex', alignItems: 'center', justifyContent: 'space-between', flexWrap: 'wrap', gap: 20 }}>
        <div style={{ fontSize: 13, color: 'var(--ink2)' }}>Shaping the next generation of Texas cities</div>
        <div style={{ display: 'flex', alignItems: 'center', gap: 12 }}>
          <svg width="28" height="28" viewBox="0 0 36 36">
            <g stroke="var(--accent)" strokeWidth="2" fill="none" strokeLinecap="round">
              <line x1="18" y1="4" x2="18" y2="32" />
              <line x1="4" y1="18" x2="32" y2="18" />
              <line x1="8" y1="8" x2="28" y2="28" />
              <line x1="28" y1="8" x2="8" y2="28" />
            </g>
          </svg>
          <div>
            <div style={{ fontFamily: 'var(--serif)', fontSize: 15, color: 'var(--ink)' }}>Mixed-Use Development</div>
            <div style={{ fontFamily: 'var(--mono)', fontSize: 9, color: 'var(--ink3)', letterSpacing: '0.08em' }}>URBAN PORTFOLIO</div>
          </div>
        </div>
        <div style={{ fontSize: 13, color: 'var(--ink2)' }}>Designing Affordable Places</div>
      </footer>
    </>);

}

ReactDOM.createRoot(document.getElementById('root')).render(<Main />);
</script>
</body>
</html>
