<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Legacy TOD — Plano, TX</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
  <style>
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
    :root{--bg:#F4F2F8;--bg2:#EAE8F0;--ink:#17141C;--ink2:#56505E;--ink3:#8A8492;--accent:#5A3E7A;--border:#D8D4E4;--font:'Space Grotesk',sans-serif;--mono:'Space Mono',monospace;}
    html{scroll-behavior:smooth;}body{background:var(--bg);color:var(--ink);font-family:var(--font);overflow-x:hidden;}
  </style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const{useState,useEffect}=React;
const TW=64,TH=32,FH=20,OX=0,OY=70;
function iso(col,row,floor){return{x:OX+(col-row)*TW/2,y:OY+(col+row)*TH/2-floor*FH};}
function pStr(pts){return pts.map(p=>`${p.x.toFixed(1)},${p.y.toFixed(1)}`).join(' ');}

const ZONES={residential:{top:'#C8C0D8',left:'#B0A8C0',right:'#9890A8',label:'Residential'},office:{top:'#C0C8D8',left:'#A8B0C0',right:'#9098A8',label:'Corporate Office'},transit:{top:'#D0C8C0',left:'#B8B0A8',right:'#A09890',label:'Transit'},green:{top:'#AACF96',left:'#92B67E',right:'#7A9D66',label:'Green Space'},commercial:{top:'#D0C8B8',left:'#B8B0A0',right:'#A09888',label:'Commercial'},parking:{top:'#C4C0C8',left:'#ACAAB0',right:'#949298',label:'Parking'}};

const BUILDINGS=[
  {id:'res-a',col:0,row:0,w:2,d:2,h:9,zone:'residential',label:'Residential Tower A'},
  {id:'res-b',col:0,row:3,w:2,d:2,h:7,zone:'residential',label:'Residential Tower B'},
  {id:'transit-main',col:3,row:0,w:3,d:2,h:3,zone:'transit',label:'DART Station Hub'},
  {id:'off-a',col:7,row:0,w:3,d:2,h:5,zone:'office',label:'Corporate Campus A'},
  {id:'off-b',col:7,row:3,w:2,d:2,h:4,zone:'office',label:'Corporate Campus B'},
  {id:'green-a',col:3,row:3,w:2,d:2,h:0.3,zone:'green',label:'Station Green'},
  {id:'com-a',col:0,row:6,w:5,d:2,h:2,zone:'commercial',label:'Village Retail'},
  {id:'green-b',col:6,row:6,w:2,d:2,h:0.3,zone:'green',label:'West Park'},
  {id:'park-a',col:9,row:6,w:2,d:2,h:4,zone:'parking',label:'Parking Structure'},
  {id:'res-c',col:0,row:9,w:3,d:2,h:5,zone:'residential',label:'Residential Tower C'},
  {id:'com-b',col:4,row:9,w:4,d:2,h:2,zone:'commercial',label:'Market Street'},
].sort((a,b)=>(a.col+a.row)-(b.col+b.row));

const ZONE_DATA={
  residential:{headline:'Residential Towers',sub:'780 units across three towers',desc:'Three residential towers offering walkable access to DART light rail and Plano corporate campuses, with a unit mix for transit commuters.',stats:[['780','Units'],['30/24/18','Floors'],['620,000','Sq Ft'],['15%','Affordable']],phase:'Phase 1 · Est. Q3 2028'},
  transit:{headline:'DART Station Hub',sub:'Silver Line TOD anchor',desc:'New DART Silver Line station integrated with bus rapid transit and bike-share, creating a seamless transit gateway for Plano Legacy corridor.',stats:[['62,000','Sq Ft'],['2','Rail Platforms'],['150','Bike Spaces'],['9,000','Daily Riders']],phase:'Phase 1 · Est. Q1 2027'},
  office:{headline:'Corporate Campus',sub:'260,000 sq ft Class A office',desc:'Two interconnected campus buildings for Plano Legacy corridor employers seeking walkable, transit-accessible headquarters.',stats:[['260,000','Sq Ft'],['18/14','Floors'],['20,000','Floor Plate'],['2029','Occupancy']],phase:'Phase 2 · Est. Q1 2029'},
  green:{headline:'Green Spaces',sub:'5 acres of transit-oriented parks',desc:'Station Green and West Park provide shaded amenity space with native North Texas planting connecting DART riders to Plano trail network.',stats:[['5 acres','Area'],['220','Trees'],['0.7 mi','Trails'],['80%','Native']],phase:'Phase 1 · Est. Q3 2027'},
  commercial:{headline:'Village Retail & Market Street',sub:'100,000 sq ft street-level retail',desc:'Two retail corridors anchor the ground floor with local restaurants, boutiques, and a weekly farmers market.',stats:[['100,000','Sq Ft'],['35+','Tenants'],['55%','Local-Owned'],['Weekly','Farmers Market']],phase:'Phase 1 · Est. Q3 2028'},
  parking:{headline:'Parking Structure',sub:'800 spaces, smart-enabled',desc:'Smart parking with dynamic pricing, EV charging, and solar carport, designed for future conversion potential.',stats:[['800','Spaces'],['200','EV Chargers'],['280 kW','Solar'],['5','Levels']],phase:'Phase 2 · Est. Q2 2029'},
};

function BuildingBlock({b,hovered,selected,onHover,onClick}){
  const{col,row,w,d,h,zone}=b;const c=ZONES[zone];
  const isH=hovered===b.id,isS=selected===b.id;
  const top=[iso(col,row,h),iso(col+w,row,h),iso(col+w,row+d,h),iso(col,row+d,h)];
  const left=[iso(col,row+d,h),iso(col+w,row+d,h),iso(col+w,row+d,0),iso(col,row+d,0)];
  const right=[iso(col+w,row,h),iso(col+w,row+d,h),iso(col+w,row+d,0),iso(col+w,row,0)];
  return(<g style={{cursor:'pointer',filter:(isH||isS)?'brightness(1.1)':undefined}} onClick={()=>onClick(b)} onMouseEnter={()=>onHover(b.id)} onMouseLeave={()=>onHover(null)}>
    {h>0.5&&<polygon points={pStr(left)} fill={c.left} stroke="#EEECf4" strokeWidth="0.5"/>}
    {h>0.5&&<polygon points={pStr(right)} fill={c.right} stroke="#EEECf4" strokeWidth="0.5"/>}
    <polygon points={pStr(top)} fill={c.top} stroke="#EEECf4" strokeWidth="0.5"/>
    {isS&&<polygon points={pStr(top)} fill="none" stroke="var(--accent)" strokeWidth="2.5" strokeLinejoin="round"/>}
    {isH&&!isS&&<polygon points={pStr(top)} fill="none" stroke="var(--accent)" strokeWidth="1.5" strokeOpacity="0.5" strokeLinejoin="round"/>}
  </g>);
}

function IsoModel({onSelect,selected}){
  const[hovered,setHovered]=useState(null);
  const gnd=[iso(0,0,0),iso(12,0,0),iso(12,12,0),iso(0,12,0)];
  return(<svg viewBox="-420 -200 840 640" style={{width:'100%',height:'100%',display:'block'}}>
    <polygon points={pStr(gnd)} fill="#E4E0EE"/>
    {[2,4,6,8,10].map(r=><line key={`gr${r}`} x1={iso(0,r,0).x} y1={iso(0,r,0).y} x2={iso(12,r,0).x} y2={iso(12,r,0).y} stroke="#D8D4E4" strokeWidth="0.5" strokeDasharray="4 4"/>)}
    {[2,4,6,8,10].map(c=><line key={`gc${c}`} x1={iso(c,0,0).x} y1={iso(c,0,0).y} x2={iso(c,12,0).x} y2={iso(c,12,0).y} stroke="#D8D4E4" strokeWidth="0.5" strokeDasharray="4 4"/>)}
    {BUILDINGS.map(b=><BuildingBlock key={b.id} b={b} hovered={hovered} selected={selected} onHover={setHovered} onClick={onSelect}/>)}
    {hovered&&(()=>{const b=BUILDINGS.find(x=>x.id===hovered);if(!b)return null;const p=iso(b.col+b.w/2,b.row+b.d/2,b.h+0.8);return(<g><rect x={p.x-60} y={p.y-14} width="120" height="24" rx="4" fill="#17141C" fillOpacity="0.85"/><text x={p.x} y={p.y+2} textAnchor="middle" fill="white" fontSize="11" fontFamily="Space Grotesk" fontWeight="500">{b.label}</text></g>);})()}
  </svg>);
}

function InfoPanel({building,onClose}){
  const[tab,setTab]=useState('overview');
  const data=building?ZONE_DATA[building.zone]:null;
  const zone=building?ZONES[building.zone]:null;
  return(<div style={{position:'absolute',top:0,right:0,height:'100%',width:building?'360px':'0px',transition:'width 0.4s cubic-bezier(0.4,0,0.2,1)',overflow:'hidden',background:'#FAF9FC',borderLeft:'1px solid var(--border)',display:'flex',flexDirection:'column',zIndex:10}}>
    {building&&data&&(<>
      <div style={{background:zone.top,padding:'28px 28px 20px',position:'relative',flexShrink:0}}>
        <button onClick={onClose} style={{position:'absolute',top:16,right:16,background:'rgba(255,255,255,0.6)',border:'none',borderRadius:'50%',width:28,height:28,cursor:'pointer',fontSize:14}}>✕</button>
        <div style={{fontFamily:'var(--mono)',fontSize:10,letterSpacing:'0.12em',textTransform:'uppercase',color:'#17141C',opacity:0.6,marginBottom:6}}>{zone.label}</div>
        <div style={{fontSize:20,fontWeight:600,color:'#17141C',lineHeight:1.2,marginBottom:6}}>{data.headline}</div>
        <div style={{fontSize:13,color:'#17141C',opacity:0.7}}>{data.sub}</div>
      </div>
      <div style={{display:'flex',borderBottom:'1px solid var(--border)',flexShrink:0}}>
        {['overview','stats'].map(t=>(<button key={t} onClick={()=>setTab(t)} style={{flex:1,padding:'12px 0',border:'none',background:'none',cursor:'pointer',fontFamily:'var(--font)',fontSize:12,fontWeight:500,color:tab===t?'var(--accent)':'var(--ink2)',borderBottom:tab===t?'2px solid var(--accent)':'2px solid transparent',transition:'all 0.2s'}}>{t.charAt(0).toUpperCase()+t.slice(1)}</button>))}
      </div>
      <div style={{flex:1,overflowY:'auto',padding:'24px 28px'}}>
        {tab==='overview'&&<div>
          <div style={{width:'100%',aspectRatio:'16/9',background:'#DDD8EC',borderRadius:8,marginBottom:20,display:'flex',alignItems:'center',justifyContent:'center',position:'relative',overflow:'hidden'}}>
            <svg width="100%" height="100%" style={{position:'absolute',inset:0}}><defs><pattern id={`sp-${building.id}`} x="0" y="0" width="12" height="12" patternUnits="userSpaceOnUse" patternTransform="rotate(35)"><line x1="0" y1="0" x2="0" y2="12" stroke="#D0CCE0" strokeWidth="1"/></pattern></defs><rect width="100%" height="100%" fill={`url(#sp-${building.id})`}/></svg>
            <div style={{position:'relative',zIndex:1,textAlign:'center',fontFamily:'var(--mono)',fontSize:10,color:'var(--ink3)',lineHeight:1.6}}><div style={{fontSize:20,marginBottom:4,opacity:0.5}}>◻</div>Architectural Rendering<br/>{data.headline}</div>
          </div>
          <p style={{fontSize:14,lineHeight:1.7,color:'var(--ink2)',marginBottom:20}}>{data.desc}</p>
          <div style={{display:'inline-flex',alignItems:'center',gap:8,background:'var(--bg2)',borderRadius:20,padding:'6px 14px',fontSize:12,fontFamily:'var(--mono)'}}>
            <span style={{color:'var(--accent)',fontSize:8}}>●</span><span style={{color:'var(--ink2)'}}>{data.phase}</span>
          </div>
        </div>}
        {tab==='stats'&&<div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:12}}>
          {data.stats.map(([val,lbl])=>(<div key={lbl} style={{background:'var(--bg2)',borderRadius:8,padding:'16px 14px'}}>
            <div style={{fontSize:22,fontWeight:700,color:'var(--ink)',letterSpacing:'-0.02em',marginBottom:4}}>{val}</div>
            <div style={{fontSize:11,color:'var(--ink3)',fontFamily:'var(--mono)',letterSpacing:'0.06em',textTransform:'uppercase'}}>{lbl}</div>
          </div>))}
        </div>}
      </div>
    </>)}
  </div>);
}

function ProjectsNav(){
  const projects=[
    {name:'Dallas Mixed-Use',city:'Dallas, TX',color:'#479db3',href:'index.html'},
    {name:'Frisco Innovation Hub',city:'Frisco, TX',color:'#2E7D7D',href:'frisco-project.html'},
    {name:'Plano Legacy TOD',city:'Plano, TX',color:'#5A3E7A',href:'plano-project.html',active:true},
    {name:'Fort Worth Rail Yard',city:'Fort Worth, TX',color:'#A0522D',href:'fort-worth-project.html'},
    {name:'Houston TOD',city:'Houston, TX',color:'#4A7A3D',href:'houston-project.html'},
    {name:'Austin Waterfront',city:'Austin, TX',color:'#3D5A7A',href:'austin-project.html'},
    {name:'El Paso Borderlands',city:'El Paso, TX',color:'#8B6914',href:'el-paso-project.html'},
    {name:'San Antonio Arts',city:'San Antonio, TX',color:'#7A4A6B',href:'san-antonio-project.html'},
  ];
  return(<section style={{padding:'80px 48px',background:'var(--ink)'}}>
    <div style={{maxWidth:1100,margin:'0 auto'}}>
      <div style={{fontFamily:'var(--mono)',fontSize:10,letterSpacing:'0.15em',color:'rgba(255,255,255,0.4)',textTransform:'uppercase',marginBottom:12}}>Portfolio</div>
      <h2 style={{fontSize:32,fontWeight:700,letterSpacing:'-0.025em',color:'white',marginBottom:40}}>Other Developments</h2>
      <div style={{display:'grid',gridTemplateColumns:'repeat(4,1fr)',gap:16}}>
        {projects.map(p=>(<a key={p.name} href={p.href} style={{display:'block',textDecoration:'none',background:p.active?p.color:'rgba(255,255,255,0.07)',borderRadius:10,padding:'24px',border:p.active?`2px solid ${p.color}`:'1px solid rgba(255,255,255,0.12)',transition:'all 0.2s',cursor:p.active?'default':'pointer',position:'relative'}}
          onMouseEnter={e=>{if(!p.active){e.currentTarget.style.background='rgba(255,255,255,0.12)';e.currentTarget.style.borderColor='rgba(255,255,255,0.3)';}}}
          onMouseLeave={e=>{if(!p.active){e.currentTarget.style.background='rgba(255,255,255,0.07)';e.currentTarget.style.borderColor='rgba(255,255,255,0.12)';}}}
        >
          {p.active&&<div style={{position:'absolute',top:10,right:10,background:'rgba(255,255,255,0.2)',borderRadius:20,padding:'2px 8px',fontSize:9,fontFamily:'var(--mono)',color:'white',letterSpacing:'0.08em'}}>CURRENT</div>}
          <div style={{width:32,height:32,borderRadius:6,background:p.active?'rgba(255,255,255,0.25)':p.color,marginBottom:12}}/>
          <div style={{fontSize:14,fontWeight:600,color:'white',marginBottom:3}}>{p.name}</div>
          <div style={{fontSize:11,color:'rgba(255,255,255,0.5)',fontFamily:'var(--mono)'}}>{p.city}</div>
          {!p.active&&<div style={{fontSize:11,color:'rgba(255,255,255,0.4)',marginTop:10}}>View →</div>}
        </a>))}
      </div>
    </div>
  </section>);
}

function App(){
  const[selected,setSelected]=useState(null);
  const[scrollY,setScrollY]=useState(0);
  useEffect(()=>{const f=()=>setScrollY(window.scrollY);window.addEventListener('scroll',f,{passive:true});return()=>window.removeEventListener('scroll',f);},[]);
  return(<>
    <nav style={{position:'fixed',top:0,left:0,right:0,zIndex:100,display:'flex',alignItems:'center',justifyContent:'space-between',padding:'0 48px',height:64,background:scrollY>60?'rgba(244,242,248,0.95)':'transparent',backdropFilter:scrollY>60?'blur(12px)':'none',borderBottom:scrollY>60?'1px solid var(--border)':'none',transition:'all 0.3s'}}>
      <div style={{display:'flex',alignItems:'center',gap:12}}>
        <div style={{width:28,height:28,background:'var(--accent)',borderRadius:4,display:'flex',alignItems:'center',justifyContent:'center',color:'white',fontSize:12,fontWeight:700}}>MX</div>
        <span style={{fontSize:14,fontWeight:600}}>Plano Legacy TOD</span>
      </div>
      <div style={{display:'flex',alignItems:'center',gap:24}}><a href="home.html" style={{fontSize:13,color:'var(--ink2)',textDecoration:'none',display:'inline-flex',alignItems:'center',gap:6}}><svg width="13" height="13" viewBox="0 0 16 16" fill="none" stroke="currentColor" strokeWidth="1.6" strokeLinecap="round" strokeLinejoin="round"><path d="M2 7 L8 2 L14 7 L14 14 L10 14 L10 9 L6 9 L6 14 L2 14 Z"/></svg>Home</a><a href="index.html" style={{fontSize:13,color:'var(--ink2)',textDecoration:'none'}}>← Dallas</a></div>
    </nav>
    <section style={{minHeight:'100vh',display:'flex',flexDirection:'column',justifyContent:'center',alignItems:'center',padding:'80px 48px 40px',background:'linear-gradient(180deg,#EAE8F0 0%,#F4F2F8 60%)',textAlign:'center'}}>
      <div style={{fontFamily:'var(--mono)',fontSize:11,letterSpacing:'0.18em',color:'var(--accent)',textTransform:'uppercase',marginBottom:20}}>Plano, Texas · DFW Metro · Transit Village</div>
      <h1 style={{fontSize:'clamp(36px,5vw,64px)',fontWeight:700,lineHeight:1.05,letterSpacing:'-0.03em',color:'var(--ink)',maxWidth:700,marginBottom:24}}>Transit-First Living at<br/><span style={{color:'var(--accent)'}}>Plano Legacy TOD</span></h1>
      <p style={{fontSize:17,lineHeight:1.7,color:'var(--ink2)',maxWidth:500,marginBottom:48}}>A 10-acre transit village anchored by a DART Silver Line station, placing 780 homes and 260,000 sf of corporate office within steps of rail.</p>
      <a href="#model" style={{background:'var(--ink)',color:'white',padding:'14px 28px',borderRadius:8,fontSize:14,fontWeight:600,textDecoration:'none'}}>Explore Site Plan</a>
    </section>
    <section id="model" style={{background:'var(--bg)',paddingTop:60}}>
      <div style={{padding:'0 48px 24px'}}>
        <div style={{fontFamily:'var(--mono)',fontSize:10,letterSpacing:'0.15em',color:'var(--ink3)',textTransform:'uppercase',marginBottom:12}}>Interactive Site Plan</div>
        <h2 style={{fontSize:28,fontWeight:700,letterSpacing:'-0.025em',color:'var(--ink)',marginBottom:16}}>Explore the District</h2>
        <div style={{display:'flex',flexWrap:'wrap',gap:'8px 16px'}}>
          {Object.entries(ZONES).map(([k,z])=>(<div key={k} style={{display:'flex',alignItems:'center',gap:6}}><div style={{width:12,height:12,borderRadius:2,background:z.top,border:'1px solid rgba(0,0,0,0.1)'}}/><span style={{fontSize:11,color:'var(--ink3)',fontFamily:'var(--mono)',letterSpacing:'0.04em'}}>{z.label.toUpperCase()}</span></div>))}
        </div>
      </div>
      <div style={{position:'relative',height:'65vh',minHeight:460,borderTop:'1px solid var(--border)',borderBottom:'1px solid var(--border)',overflow:'hidden',background:'#E4E0EE'}}>
        <div style={{position:'absolute',inset:0,paddingRight:selected?360:0,transition:'padding-right 0.4s cubic-bezier(0.4,0,0.2,1)',display:'flex',alignItems:'center',justifyContent:'center'}}>
          <IsoModel onSelect={b=>setSelected(p=>p?.id===b.id?null:b)} selected={selected?.id||null}/>
        </div>
        <InfoPanel building={selected} onClose={()=>setSelected(null)}/>
        {!selected&&<div style={{position:'absolute',bottom:20,left:'50%',transform:'translateX(-50%)',background:'rgba(23,20,28,0.75)',color:'white',padding:'8px 16px',borderRadius:20,fontSize:12,fontFamily:'var(--mono)',backdropFilter:'blur(8px)',whiteSpace:'nowrap'}}>Click a building to explore</div>}
      </div>
    </section>
    <section style={{padding:'60px 48px',background:'var(--bg2)'}}>
      <div style={{maxWidth:1100,margin:'0 auto',display:'grid',gridTemplateColumns:'repeat(4,1fr)',gap:1,border:'1px solid var(--border)',borderRadius:10,overflow:'hidden',background:'var(--border)'}}>
        {[['10 acres','Site Area'],['$1.3B','Total Investment'],['3,400+','Jobs Created'],['780','New Homes']].map(([v,l])=>(<div key={l} style={{background:'var(--bg)',padding:'28px',textAlign:'center'}}>
          <div style={{fontSize:32,fontWeight:700,letterSpacing:'-0.03em',color:'var(--ink)',marginBottom:6}}>{v}</div>
          <div style={{fontSize:11,color:'var(--ink3)',fontFamily:'var(--mono)',letterSpacing:'0.08em',textTransform:'uppercase'}}>{l}</div>
        </div>))}
      </div>
    </section>
    <ProjectsNav/>
    <footer style={{background:'#110E16',color:'white',padding:'48px',display:'flex',justifyContent:'space-between',alignItems:'center',flexWrap:'wrap',gap:24}}>
      <div>
        <div style={{fontWeight:700,fontSize:16,marginBottom:6}}>Plano Legacy TOD</div>
        <div style={{fontSize:12,opacity:0.4,fontFamily:'var(--mono)'}}>Plano, Texas · DFW Metro · 2025–2029</div>
      </div>
      <a href="mailto:info@planolегacytod.com" style={{color:'var(--accent)',fontSize:14,fontWeight:600,textDecoration:'none'}}>info@planelegacytod.com</a>
    </footer>
  </>);
}
ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
