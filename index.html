// ─── BUILDING BLOCK ──────────────────────────────────────────────────────
function BuildingBlock({ b, hovered, selected, onHover, onClick, zones, accent }) {
  const { col, row, w, d, h, zone } = b;
  const c = (zones||ZONES)[zone] || {top:'#CCC',left:'#BBB',right:'#AAA'};
  const isH = hovered === b.id;
  const isS = selected === b.id;

  const top = [iso(col, row, h), iso(col + w, row, h), iso(col + w, row + d, h), iso(col, row + d, h)];
  const left = [iso(col, row + d, h), iso(col + w, row + d, h), iso(col + w, row + d, 0), iso(col, row + d, 0)];
  const right = [iso(col + w, row, h), iso(col + w, row + d, h), iso(col + w, row + d, 0), iso(col + w, row, 0)];

  const brightness = isH ? 'brightness(1.08)' : isS ? 'brightness(1.12)' : 'none';

  return (
    <g
      style={{ cursor: 'pointer', filter: brightness !== 'none' ? brightness : undefined }}
      onClick={() => onClick(b)}
      onMouseEnter={() => onHover(b.id)}
      onMouseLeave={() => onHover(null)}>
      
          {h > 0.5 && <polygon points={pStr(left)} fill={c.left} stroke="#F0EDE8" strokeWidth="0.5" />}
          {h > 0.5 && <polygon points={pStr(right)} fill={c.right} stroke="#F0EDE8" strokeWidth="0.5" />}
          <polygon points={pStr(top)} fill={c.top} stroke="#F0EDE8" strokeWidth="0.5" />
          {isS && <polygon points={pStr(top)} fill="none" stroke={accent||"#C4714A"} strokeWidth="2.5" strokeLinejoin="round" />}
          {isH && !isS && <polygon points={pStr(top)} fill="none" stroke={accent||"#C4714A"} strokeWidth="1.5" strokeOpacity="0.5" strokeLinejoin="round" />}
        </g>);

}

  const groundColor = (plan && plan.groundColor) || '#E8E4DE';
  const gridColor = (plan && plan.gridColor) || '#D8D4CE';
  const gnd = [iso(0, 0, 0), iso(12, 0, 0), iso(12, 12, 0), iso(0, 12, 0)];
  // Road strips (flat thin boxes as ground markings)
  const roadH = [iso(0, 5.9, 0.05), iso(12, 5.9, 0.05), iso(12, 6.1, 0.05), iso(0, 6.1, 0.05)];

        </svg>);

}

const TWEAK_DEFAULTS = /*EDITMODE-BEGIN*/{

  "showGridLines": true
} /*EDITMODE-END*/;

function TweaksPanel({ visible }) {
  const [vals, setVals] = useState(TWEAK_DEFAULTS);
  const update = (key, value) => {
    const next = { ...vals, [key]: value };
    setVals(next);
    document.documentElement.style.setProperty('--accent', next.accentColor);
    window.parent.postMessage({ type: '__edit_mode_set_keys', edits: next }, '*');
  };
  if (!visible) return null;
  return (
    <div style={{
      position: 'fixed', bottom: 24, right: 24, zIndex: 999,
      background: 'white', border: '1px solid var(--border)',
      borderRadius: 12, padding: 20, width: 260,
      boxShadow: '0 8px 32px rgba(0,0,0,0.12)'
    }}>
          <div style={{ fontWeight: 600, fontSize: 13, marginBottom: 16, color: 'var(--ink)' }}>Tweaks</div>
          <label style={{ display: 'block', marginBottom: 14 }}>
            <div style={{ fontSize: 11, color: 'var(--ink3)', fontFamily: 'var(--mono)', marginBottom: 6, textTransform: 'uppercase', letterSpacing: '0.08em' }}>Accent Color</div>
            <div style={{ display: 'flex', alignItems: 'center', gap: 8 }}>
              <input type="color" value={vals.accentColor} onChange={(e) => update('accentColor', e.target.value)}
          style={{ width: 32, height: 32, border: 'none', borderRadius: 4, cursor: 'pointer' }} />
              <span style={{ fontSize: 12, fontFamily: 'var(--mono)', color: 'var(--ink2)' }}>{vals.accentColor}</span>
            </div>
          </label>
          <label style={{ display: 'block', marginBottom: 14 }}>
            <div style={{ fontSize: 11, color: 'var(--ink3)', fontFamily: 'var(--mono)', marginBottom: 6, textTransform: 'uppercase', letterSpacing: '0.08em' }}>Grid Lines</div>
            <input type="checkbox" checked={vals.showGridLines}
        onChange={(e) => update('showGridLines', e.target.checked)}
        style={{ cursor: 'pointer' }} />
            <span style={{ fontSize: 12, marginLeft: 8, color: 'var(--ink2)' }}>Show on model</span>
          </label>
        </div>);

}

// ─── APP ──────────────────────────────────────────────────────────────────
function App() {
  const [scrollY, setScrollY] = useState(0);
  const [tweaksVisible, setTweaksVisible] = useState(false);

  useEffect(() => {
    const onScroll = () => setScrollY(window.scrollY);
    window.addEventListener('scroll', onScroll, { passive: true });
    return () => window.removeEventListener('scroll', onScroll);
  }, []);

  useEffect(() => {
    // Register tweaks
    window.addEventListener('message', (e) => {
      if (e.data?.type === '__activate_edit_mode') setTweaksVisible(true);
      if (e.data?.type === '__deactivate_edit_mode') setTweaksVisible(false);
    });
    window.parent.postMessage({ type: '__edit_mode_available' }, '*');
  }, []);

  return (
    <>
          <Nav scrollY={scrollY} />
          <Hero />
          <ModelSection />
          <About />
          <Timeline />
          <Team />
          <Footer />
          <TweaksPanel visible={tweaksVisible} />
        </>);

}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
